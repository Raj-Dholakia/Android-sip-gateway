 same => n(skip_mark),Hangup()

; Incoming SMS from gateways to clients (101-104)




exten => _X.,1,NoOp(Unknown SMS destination: ${EXTEN})
 same => n,Hangup()

; Context for retrying failed SMS
[retry-sms]
; Literal extensions for retry (call files cannot match patterns with Local channels)

; Incoming SMS retry (GSM -> SIP client)
exten => incoming-101,1,NoOp(Retry incoming SMS from ${FROM} to ${TO})
 same => n,Set(MESSAGE(body)=${BODY})
 same => n,Set(MESSAGE(from)=<sip:${FROM}@YOUR_DOMAIN>)
 same => n,MessageSend(pjsip:101,${MESSAGE(from)})
 same => n,GotoIf($["${MESSAGE_SEND_STATUS}" = "SUCCESS"]?mark:skip)
 same => n(mark),System(/usr/local/bin/gateway-notify.py --mark-sip-delivered-by-id ${EVENT_ID})
 same => n(skip),Hangup()

exten => incoming-102,1,NoOp(Retry incoming SMS from ${FROM} to ${TO})
