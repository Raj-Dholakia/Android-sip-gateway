[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

; Context for internal calls between clients
[internal]
; Calls between clients 101-104
exten => _10[1-4],1,NoOp(Internal call from ${CALLERID(num)} to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},60)
 same => n,Hangup()

; Outgoing to +7 or 8 (Russia)
; 101 and 102 go through gateway1, 103 and 104 through gateway2
; Pattern for Russian numbers: +7XXXXXXXXXX (11 digits) or 8XXXXXXXXXX (11 digits)
exten => _+7XXXXXXXXXX,1,NoOp(Outgoing call from ${CALLERID(num)} to ${EXTEN})
 same => n,GotoIf($["${CALLERID(num)}" = "101"]?send-gw1)
 same => n,GotoIf($["${CALLERID(num)}" = "102"]?send-gw1)
 same => n,GotoIf($["${CALLERID(num)}" = "103"]?send-gw2)
 same => n,GotoIf($["${CALLERID(num)}" = "104"]?send-gw2)
 same => n,Hangup()
 same => n(send-gw1),Set(GATEWAY_ID=gateway1)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_call ${CALLERID(num)} ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()
 same => n(send-gw2),Set(GATEWAY_ID=gateway2)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_call ${CALLERID(num)} ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway2,60)
 same => n,Hangup()

exten => _8XXXXXXXXXX,1,NoOp(Outgoing call from ${CALLERID(num)} to ${EXTEN})
 same => n,GotoIf($["${CALLERID(num)}" = "101"]?send-gw1)
 same => n,GotoIf($["${CALLERID(num)}" = "102"]?send-gw1)
 same => n,GotoIf($["${CALLERID(num)}" = "103"]?send-gw2)
 same => n,GotoIf($["${CALLERID(num)}" = "104"]?send-gw2)
 same => n,Hangup()
 same => n(send-gw1),Set(GATEWAY_ID=gateway1)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_call ${CALLERID(num)} ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway1,60)
 same => n,Hangup()
 same => n(send-gw2),Set(GATEWAY_ID=gateway2)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_call ${CALLERID(num)} ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@gateway2,60)
 same => n,Hangup()

; Context for incoming calls from GSM gateways
[from-gateways]
; Incoming calls from gateway1 -> 101 or 102
; Incoming calls from gateway2 -> 103 or 104
; Gateways send GSM number in X-GSM-CallerID header

exten => 101,1,NoOp(Incoming call from gateway to 101)
 same => n,Set(GSM_CALLER=${PJSIP_HEADER(read,X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_CALLER}" != ""]?set_caller:skip_caller)
 same => n(set_caller),Set(CALLERID(num)=${GSM_CALLER})
 same => n,Set(CALLERID(name)=${GSM_CALLER})
 same => n,NoOp(Set CallerID to GSM number: ${GSM_CALLER})
 same => n(skip_caller),System(/usr/local/bin/gateway-notify.py gateway1 incoming_call ${GSM_CALLER} 101)
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

exten => 102,1,NoOp(Incoming call from gateway to 102)
 same => n,Set(GSM_CALLER=${PJSIP_HEADER(read,X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_CALLER}" != ""]?set_caller:skip_caller)
 same => n(set_caller),Set(CALLERID(num)=${GSM_CALLER})
 same => n,Set(CALLERID(name)=${GSM_CALLER})
 same => n,NoOp(Set CallerID to GSM number: ${GSM_CALLER})
 same => n(skip_caller),System(/usr/local/bin/gateway-notify.py gateway1 incoming_call ${GSM_CALLER} 102)
 same => n,Dial(PJSIP/102,60)
 same => n,Hangup()

exten => 103,1,NoOp(Incoming call from gateway to 103)
 same => n,Set(GSM_CALLER=${PJSIP_HEADER(read,X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_CALLER}" != ""]?set_caller:skip_caller)
 same => n(set_caller),Set(CALLERID(num)=${GSM_CALLER})
 same => n,Set(CALLERID(name)=${GSM_CALLER})
 same => n,NoOp(Set CallerID to GSM number: ${GSM_CALLER})
 same => n(skip_caller),System(/usr/local/bin/gateway-notify.py gateway2 incoming_call ${GSM_CALLER} 103)
 same => n,Dial(PJSIP/103,60)
 same => n,Hangup()

exten => 104,1,NoOp(Incoming call from gateway to 104)
 same => n,Set(GSM_CALLER=${PJSIP_HEADER(read,X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_CALLER}" != ""]?set_caller:skip_caller)
 same => n(set_caller),Set(CALLERID(num)=${GSM_CALLER})
 same => n,Set(CALLERID(name)=${GSM_CALLER})
 same => n,NoOp(Set CallerID to GSM number: ${GSM_CALLER})
 same => n(skip_caller),System(/usr/local/bin/gateway-notify.py gateway2 incoming_call ${GSM_CALLER} 104)
 same => n,Dial(PJSIP/104,60)
 same => n,Hangup()

; Any other incoming from gateways
exten => _X.,1,NoOp(Unknown incoming from gateway: ${EXTEN})
 same => n,Hangup()

; Context for SMS via SIP MESSAGE
[messages]
; Unified handler for both GSM SMS and internal messages
exten => _10[1-4],1,NoOp(*** MESSAGES CONTEXT _10[1-4] TRIGGERED *** Message to ${EXTEN})
 same => n,Set(GSM_SENDER=${MESSAGE_DATA(X-GSM-CallerID)})
 same => n,GotoIf($["${GSM_SENDER}" != ""]?handle_gsm:handle_internal)

; Handle GSM SMS (has X-GSM-CallerID header)
 same => n(handle_gsm),NoOp(Incoming GSM SMS from ${GSM_SENDER} to ${EXTEN})
 same => n,Set(MESSAGE(from)=<sip:${GSM_SENDER}@YOUR_DOMAIN>)
 same => n,Set(GATEWAY_ID=${IF($["${EXTEN}"="101"]?gateway1:${IF($["${EXTEN}"="102"]?gateway1:${IF($["${EXTEN}"="103"]?gateway2:gateway2)})})})
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} incoming_sms ${GSM_SENDER} ${EXTEN} "${MESSAGE(body)}")
 same => n,MessageSend(pjsip:${EXTEN},${MESSAGE(from)})
 same => n,GotoIf($["${MESSAGE_SEND_STATUS}" = "SUCCESS"]?mark_gsm:skip_mark)
 same => n(mark_gsm),System(/usr/local/bin/gateway-notify.py --mark-sip-delivered ${GATEWAY_ID} incoming_sms)
 same => n,Goto(skip_mark)

; Handle internal messages (no X-GSM-CallerID header)
 same => n(handle_internal),NoOp(Internal message from ${MESSAGE(from)} to ${EXTEN})
 same => n,Set(FROM_USER=${CUT(CUT(MESSAGE(from),@,1),:,2)})
 same => n,Set(GATEWAY_ID=${IF($["${FROM_USER}"="101"]?gateway1:${IF($["${FROM_USER}"="102"]?gateway1:${IF($["${FROM_USER}"="103"]?gateway2:gateway2)})})})
 same => n,System(/usr/local/bin/gateway-notify.py --no-telegram ${GATEWAY_ID} internal_message ${FROM_USER} ${EXTEN} "${MESSAGE(body)}")
 same => n,Set(CONTACT_STATUS=${PJSIP_CONTACT(${EXTEN},status)})
 same => n,NoOp(Contact status for ${EXTEN}: ${CONTACT_STATUS})
 same => n,GotoIf($["${CONTACT_STATUS}" = "Avail"]?send_msg:skip_mark)
 same => n(send_msg),MessageSend(pjsip:${EXTEN},${MESSAGE(from)})
 same => n,GotoIf($["${MESSAGE_SEND_STATUS}" = "SUCCESS"]?mark_internal:skip_mark)
 same => n(mark_internal),System(/usr/local/bin/gateway-notify.py --mark-sip-delivered ${GATEWAY_ID} internal_message)
 same => n(skip_mark),Hangup()

; Outgoing SMS to +7 or 8 (via gateways)
exten => _+7XXXXXXXXXX,1,NoOp(Outgoing SMS from ${MESSAGE(from)} to ${EXTEN})
exten => _+7XXXXXXXXXX,1,NoOp(Outgoing SMS from ${MESSAGE(from)} to ${EXTEN})
 same => n,Set(FROM_USER=${CUT(CUT(MESSAGE(from),@,1),:,2)})
 same => n,NoOp(From user: ${FROM_USER})
 same => n,GotoIf($["${FROM_USER}" = "101"]?send-gw1)
 same => n,GotoIf($["${FROM_USER}" = "102"]?send-gw1)
 same => n,GotoIf($["${FROM_USER}" = "103"]?send-gw2)
 same => n,GotoIf($["${FROM_USER}" = "104"]?send-gw2)
 same => n,Hangup()
 same => n(send-gw1),Set(GATEWAY_ID=gateway1)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_sms ${FROM_USER} ${EXTEN} "${MESSAGE(body)}")
 same => n,Set(MESSAGE(to)=sip:${EXTEN}@YOUR_DOMAIN)
 same => n,MessageSend(pjsip:gateway1,${MESSAGE(from)})
 same => n,GotoIf($["${MESSAGE_SEND_STATUS}" = "SUCCESS"]?mark_delivered:skip_mark)
 same => n(mark_delivered),System(/usr/local/bin/gateway-notify.py --mark-sip-delivered ${GATEWAY_ID} outgoing_sms)
 same => n(skip_mark),Hangup()
 same => n(send-gw2),Set(GATEWAY_ID=gateway2)
 same => n,System(/usr/local/bin/gateway-notify.py ${GATEWAY_ID} outgoing_sms ${FROM_USER} ${EXTEN} "${MESSAGE(body)}")
 same => n,Set(MESSAGE(to)=sip:${EXTEN}@YOUR_DOMAIN)
 same => n,MessageSend(pjsip:gateway2,${MESSAGE(from)})
 same => n,GotoIf($["${MESSAGE_SEND_STATUS}" = "SUCCESS"]?mark_delivered:skip_mark)
 same => n(mark_delivered),System(/usr/local/bin/gateway-notify.py --mark-sip-delivered ${GATEWAY_ID} outgoing_sms)
 same => n(skip_mark),Hangup()

exten => _8XXXXXXXXXX,1,NoOp(Outgoing SMS from ${MESSAGE(from)} to ${EXTEN})
 same => n,Set(FROM_USER=${CUT(CUT(MESSAGE(from),@,1),:,2)})
 same => n,NoOp(From user: ${FROM_USER})
