[global]
type=global
endpoint_identifier_order=username,ip,anonymous

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/YOUR_DOMAIN.crt
priv_key_file=/etc/asterisk/keys/YOUR_DOMAIN.key
method=tlsv1_2
external_media_address=YOUR_DOMAIN
external_signaling_address=YOUR_DOMAIN

; Client 101 (SIM1 on gateway1)
[101]
type=endpoint
trust_id_inbound=yessend_rpid=yes
context=internal
disallow=all
allow=opus
allow=vp8
allow=h264
auth=101
aors=101
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=yes
message_context=messages
media_encryption=sdes
media_encryption_optimistic=no

[101]
type=auth
auth_type=userpass
username=101
password=YOUR_PASSWORD_HERE

[101]
type=aor
qualify_frequency=30
max_contacts=3
remove_existing=yes

